name: build-test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl tcl-dev cmake

      - name: Download and build LibreSSL
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          make install

      - name: Configure SQLCipher with LibreSSL
        run: |
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL -DSQLITE_EXTRA_INIT=sqlcipher_extra_init -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown -I$HOME/libressl/include" \
            LDFLAGS="$HOME/libressl/lib/libcrypto.a"

      - name: Build
        run: make -j$(nproc)

      - name: Build amalgamation
        run: |
          make sqlite3.c
          ls -lh sqlite3.c sqlite3.h

      - name: Smoke test — encrypted round-trip
        run: |
          gcc -O2 -o example_basic examples/basic.c \
            -I. -I$HOME/libressl/include \
            libsqlite3.a $HOME/libressl/lib/libcrypto.a -lpthread -ldl -lm
          ./example_basic

      - name: Run SQLCipher test suite
        run: |
          make testfixture
          cd test && ../testfixture sqlcipher.test 2>&1 | tail -30

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl cmake

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Download and build LibreSSL (native, for configure)
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          make install

      - name: Build SQLCipher amalgamation
        run: |
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL -DSQLITE_EXTRA_INIT=sqlcipher_extra_init -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown -I$HOME/libressl/include" \
            LDFLAGS="$HOME/libressl/lib/libcrypto.a"
          make sqlite3.c

      - name: Build LibreSSL for WASM
        run: |
          cd libressl-4.2.1
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl-wasm \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_FLAGS="-DHAVE_TIMEGM -DHAVE_GETENTROPY -D__STDC_NO_ATOMICS__"
          emmake make -j$(nproc) crypto
          mkdir -p $HOME/libressl-wasm/lib
          cp crypto/libcrypto.a $HOME/libressl-wasm/lib/

      - name: Compile SQLCipher to WASM
        run: |
          mkdir -p wasm/dist
          cp sqlite3.c wasm/dist/
          cp sqlite3.h wasm/dist/
          cp wasm/sqlcipher_wasm.c wasm/dist/

          EXPORTED='["_wasm_db_open","_wasm_db_close","_wasm_db_exec","_wasm_db_errmsg","_wasm_db_changes","_wasm_db_total_changes","_wasm_db_key","_wasm_db_prepare","_wasm_stmt_finalize","_wasm_stmt_reset","_wasm_stmt_clear_bindings","_wasm_stmt_step","_wasm_stmt_bind_text","_wasm_stmt_bind_int","_wasm_stmt_bind_double","_wasm_stmt_bind_null","_wasm_stmt_bind_parameter_count","_wasm_stmt_columns","_wasm_stmt_colname","_wasm_stmt_coltype","_wasm_stmt_int","_wasm_stmt_double","_wasm_stmt_text","_malloc","_free"]'
          RUNTIME='["cwrap","UTF8ToString","stringToUTF8","lengthBytesUTF8"]'

          cd wasm/dist
          emcc sqlcipher_wasm.c \
            -I. -I$HOME/libressl/include \
            -L$HOME/libressl-wasm/lib \
            -O2 \
            -DSQLITE_HAS_CODEC \
            -DSQLCIPHER_CRYPTO_OPENSSL \
            -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
            -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
            -DSQLITE_OMIT_LOAD_EXTENSION \
            -DSQLITE_THREADSAFE=1 \
            -DSQLITE_TEMP_STORE=2 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_JSON1 \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="$EXPORTED" \
            -s EXPORTED_RUNTIME_METHODS="$RUNTIME" \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s INITIAL_MEMORY=16777216 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="initSqlcipher" \
            -s ENVIRONMENT='web,worker,node' \
            -s FILESYSTEM=1 \
            $HOME/libressl-wasm/lib/libcrypto.a \
            -o sqlcipher.js

          rm -f sqlite3.c sqlite3.h sqlcipher_wasm.c
          ls -lh sqlcipher.js sqlcipher.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-wasm
          path: |
            wasm/dist/sqlcipher.js
            wasm/dist/sqlcipher.wasm
            wasm/sqlcipher-oo1.js
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sqlcipher-wasm
          path: release

      - name: Prepare release files
        run: |
          mkdir -p dist
          find release -type f -name '*.js' -o -name '*.wasm' | while read f; do cp "$f" dist/; done
          ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/sqlcipher.js \
            dist/sqlcipher.wasm \
            dist/sqlcipher-oo1.js \
            --title "SQLCipher WASM ${{ github.ref_name }}" \
            --notes "$(cat <<'NOTES'
          Encrypted SQLite in the browser — SQLCipher + LibreSSL, compiled to WASM.

          ## Files

          | File | Description |
          |------|-------------|
          | `sqlcipher.js` | Emscripten glue (~94KB) |
          | `sqlcipher.wasm` | Compiled binary (~1.4MB) |
          | `sqlcipher-oo1.js` | oo1 API shim + IndexedDB persistence |

          ## Quick start

          ```html
          <script src="sqlcipher.js"></script>
          <script src="sqlcipher-oo1.js"></script>
          <script>
          (async function() {
            var Module = await initSqlcipher();
            var db = await DB.load(Module, {
              filename: "/app.db",
              key: "secret",
              store: "myapp"
            });
            db.exec("CREATE TABLE IF NOT EXISTS t (x TEXT)");
            db.exec({sql: "INSERT INTO t VALUES (?)", bind: ["hello"]});
            await db.save();
          })();
          </script>
          ```

          See [docs/oo1-api.md](docs/oo1-api.md) for the full API reference.
          NOTES
          )"
