name: build-test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  native:
    strategy:
      matrix:
        include:
          # Debian (glibc) — works on Debian, Ubuntu, RHEL, etc.
          - os: ubuntu-latest
            container: debian:bookworm
            artifact: libsqlcipher-linux-glibc-x64.a
            deps: apt-get update && apt-get install -y gcc make cmake tcl tcl-dev curl ca-certificates
          - os: ubuntu-24.04-arm
            container: debian:bookworm
            artifact: libsqlcipher-linux-glibc-arm64.a
            deps: apt-get update && apt-get install -y gcc make cmake tcl tcl-dev curl ca-certificates
          # Alpine (musl) — works on Alpine, Docker scratch, etc.
          - os: ubuntu-latest
            container: alpine:3.19
            artifact: libsqlcipher-linux-musl-x64.a
            deps: apk add gcc make cmake musl-dev tcl tcl-dev curl
          # macOS
          - os: macos-latest
            container: ""
            artifact: libsqlcipher-macos-arm64.a
            deps: ""
          - os: macos-15
            container: ""
            artifact: libsqlcipher-macos-x64.a
            deps: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        if: matrix.deps != ''
        run: ${{ matrix.deps }}

      - name: Download and build LibreSSL
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          make install

      - name: Configure SQLCipher with LibreSSL
        run: |
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL -DSQLITE_EXTRA_INIT=sqlcipher_extra_init -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown -I$HOME/libressl/include" \
            LDFLAGS="$HOME/libressl/lib/libcrypto.a"

      - name: Build
        run: make -j$(nproc)

      - name: Build amalgamation
        run: |
          make sqlite3.c
          ls -lh sqlite3.c sqlite3.h

      - name: Smoke test — encrypted round-trip
        run: |
          gcc -O2 -o example_basic examples/basic.c \
            -I. -I$HOME/libressl/include \
            libsqlite3.a $HOME/libressl/lib/libcrypto.a -lpthread -ldl -lm
          ./example_basic

      - name: Run SQLCipher test suite
        if: matrix.artifact == 'libsqlcipher-linux-glibc-x64.a'
        run: |
          make testfixture
          cd test && ../testfixture sqlcipher.test 2>&1 | tail -30

      - name: Rename artifact
        run: cp libsqlite3.a ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y tcl cmake

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Download and build LibreSSL (native + WASM)
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          make install
          cd ..
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl-wasm \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_FLAGS="-DHAVE_TIMEGM -DHAVE_GETENTROPY -D__STDC_NO_ATOMICS__"
          emmake make -j$(nproc) crypto
          mkdir -p $HOME/libressl-wasm/lib
          cp crypto/libcrypto.a $HOME/libressl-wasm/lib/

      - name: Build WASM
        run: |
          LIBRESSL_NATIVE=$HOME/libressl \
          LIBRESSL_WASM=$HOME/libressl-wasm \
          ./build-sqlcipher-libressl.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare WASM test directory
        run: |
          cp wasm/dist/sqlcipher.js tests/wasm/
          cp wasm/dist/sqlcipher.wasm tests/wasm/
          cp wasm/dist/sqlcipher-api.js tests/wasm/
          cp wasm/dist/sqlcipher-worker.js tests/wasm/

      - name: Install Playwright
        run: |
          cd tests/wasm
          npm init -y > /dev/null
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run WASM tests
        run: node tests/wasm/run-tests.mjs

      - name: Package static libs for custom WASM builds
        run: |
          mkdir -p static-pkg
          cp sqlite3.c sqlite3.h static-pkg/
          cp wasm/sqlcipher_wasm.c wasm/opfs_vfs.c static-pkg/
          cp $HOME/libressl-wasm/lib/libcrypto.a static-pkg/libcrypto-wasm.a
          cp -r $HOME/libressl/include/openssl static-pkg/openssl
          tar czf wasm/dist/sqlcipher-wasm-static.tar.gz -C static-pkg .
          ls -lh wasm/dist/sqlcipher-wasm-static.tar.gz

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-wasm
          path: |
            wasm/dist/sqlcipher.js
            wasm/dist/sqlcipher.wasm
            wasm/dist/sqlcipher-wasm-static.tar.gz
            wasm/dist/sqlcipher-api.js
            wasm/dist/sqlcipher-oo1.js
            wasm/dist/sqlcipher-worker.js
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p dist
          find artifacts -type f | while read f; do cp "$f" dist/; done
          ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.js
            dist/*.wasm
            dist/*.tar.gz
            dist/*.a
