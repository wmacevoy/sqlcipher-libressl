<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQLCipher WASM — Encrypted SQLite in the Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p.sub { color: #666; margin-bottom: 1.5rem; }
  .section { margin-bottom: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; width: 100%; max-width: 300px; }
  button { padding: 0.4rem 1rem; border: none; border-radius: 4px; background: #2563eb; color: white; font-size: 0.95rem; cursor: pointer; margin: 0.3rem 0.3rem 0.3rem 0; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #94a3b8; cursor: default; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  #log { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; font-family: "SF Mono", Menlo, monospace; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
  .info { color: #2563eb; }
</style>
</head>
<body>

<h1>SQLCipher WASM</h1>
<p class="sub">Encrypted SQLite in the browser via the
  <a href="https://sqlite.org/wasm/doc/trunk/api-oo1.md">sqlite3 oo1 API</a>.
  LibreSSL crypto. Zero server dependency.</p>

<div class="section">
  <label>Encryption key</label>
  <input id="key" type="text" value="correct-horse-battery-staple" placeholder="encryption key">
</div>

<div class="section">
  <button id="btnCreate" disabled>Create encrypted DB</button>
  <button id="btnInsert" disabled>Insert row</button>
  <button id="btnQuery" disabled>Query all</button>
  <button id="btnTransaction" disabled>Transaction</button>
  <button id="btnWrongKey" class="danger" disabled>Try wrong key</button>
</div>

<div id="log">Loading SQLCipher WASM...</div>

<!-- Emscripten-generated JS — defines initSqlcipher() -->
<script src="sqlcipher.js"></script>
<!-- oo1 API shim — defines DB class -->
<script src="oo1.js"></script>

<script>
var logEl = document.getElementById("log");
function log(msg, cls) {
  var span = document.createElement("span");
  span.className = cls || "";
  span.textContent = msg + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clear() { logEl.innerHTML = ""; }

var db = null;

// ── Button handlers using oo1 API ──────────────────────────

document.getElementById("btnCreate").onclick = function() {
  clear();
  var key = document.getElementById("key").value;
  try {
    if (db) db.close();
    db = new DB(window._Module, {filename: ":memory:", key: key});

    db.exec("CREATE TABLE sensors (id TEXT PRIMARY KEY, value REAL, ts INTEGER)");
    log("Created encrypted database (key: " + key.substring(0, 8) + "...)", "ok");

    // Insert with parameterized exec
    db.exec({
      sql: "INSERT INTO sensors VALUES (?,?,?)",
      bind: ["temp_kitchen", 22.5, 1710000000]
    });
    db.exec({
      sql: "INSERT INTO sensors VALUES (?,?,?)",
      bind: ["temp_bedroom", 18.3, 1710000001]
    });
    db.exec({
      sql: "INSERT INTO sensors VALUES (?,?,?)",
      bind: ["humidity", 0.65, 1710000002]
    });
    log("Inserted 3 rows via exec({sql, bind})", "ok");

    // Query with selectObjects
    var rows = db.selectObjects("SELECT * FROM sensors ORDER BY id");
    log("\nselectObjects:", "info");
    rows.forEach(function(r) {
      log("  " + r.id + " = " + r.value + " (ts: " + r.ts + ")");
    });

    // Query with selectValue
    var count = db.selectValue("SELECT count(*) FROM sensors");
    log("\nselectValue(count): " + count, "ok");

  } catch(e) {
    log("FAIL: " + e.message, "err");
  }
};

var rowCounter = 3;
document.getElementById("btnInsert").onclick = function() {
  if (!db || !db.isOpen()) { log("No database open", "err"); return; }
  rowCounter++;
  var id = "sensor_" + rowCounter;
  var val = Math.round(Math.random() * 400) / 10;
  try {
    // Use prepare/bind/stepFinalize
    var stmt = db.prepare("INSERT INTO sensors VALUES (?,?,?)");
    stmt.bind([id, val, Date.now()]);
    stmt.stepFinalize();
    log("Inserted: " + id + " = " + val + " (via prepare/bind/stepFinalize)", "ok");
  } catch(e) {
    log("FAIL: " + e.message, "err");
  }
};

document.getElementById("btnQuery").onclick = function() {
  if (!db || !db.isOpen()) { log("No database open", "err"); return; }
  try {
    // Use prepare/step/get loop
    log("prepare + step + get({}):", "info");
    var stmt = db.prepare("SELECT * FROM sensors ORDER BY id");
    while (stmt.step()) {
      var row = stmt.get({});
      log("  " + row.id + " = " + row.value);
    }
    stmt.finalize();

    log("changes(total): " + db.changes(true), "info");
  } catch(e) {
    log("FAIL: " + e.message, "err");
  }
};

document.getElementById("btnTransaction").onclick = function() {
  if (!db || !db.isOpen()) { log("No database open", "err"); return; }
  try {
    var result = db.transaction(function() {
      db.exec({sql: "INSERT INTO sensors VALUES (?,?,?)",
               bind: ["txn_1", 99.9, Date.now()]});
      db.exec({sql: "INSERT INTO sensors VALUES (?,?,?)",
               bind: ["txn_2", 88.8, Date.now()]});
      return db.selectValue("SELECT count(*) FROM sensors");
    });
    log("Transaction committed. Total rows: " + result, "ok");
  } catch(e) {
    log("FAIL: " + e.message, "err");
  }
};

document.getElementById("btnWrongKey").onclick = function() {
  clear();
  try {
    // Close and reopen with wrong key
    if (db) db.close();
    db = new DB(window._Module, {filename: ":memory:", key: "wrong-key"});
    db.exec("CREATE TABLE t (x)");
    // In-memory DBs always work (no persistence), so this proves
    // the API works — real encryption verification needs file-backed DBs.
    log("In-memory DB opened with different key (expected — :memory: is ephemeral)", "info");
    log("File-backed encryption requires OPFS or server-side storage.", "info");
    db.close();

    // Reopen with correct key
    var key = document.getElementById("key").value;
    db = new DB(window._Module, {filename: ":memory:", key: key});
    db.exec("CREATE TABLE sensors (id TEXT PRIMARY KEY, value REAL, ts INTEGER)");
    log("\nReopened with correct key.", "ok");
  } catch(e) {
    log("Error: " + e.message, "err");
  }
};

// ── Load WASM ──────────────────────────────────────────────

(async function() {
  try {
    window._Module = await initSqlcipher();
    log("SQLCipher WASM loaded", "ok");
    log("oo1 API ready (DB, Stmt, exec, prepare, select*, transaction)\n", "info");

    document.getElementById("btnCreate").disabled = false;
    document.getElementById("btnInsert").disabled = false;
    document.getElementById("btnQuery").disabled = false;
    document.getElementById("btnTransaction").disabled = false;
    document.getElementById("btnWrongKey").disabled = false;
  } catch(e) {
    log("Failed to load WASM: " + e.message, "err");
    log("Build the WASM module first — see README.", "info");
  }
})();
</script>

</body>
</html>
