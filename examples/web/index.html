<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQLCipher WASM — Encrypted Persistent SQLite in the Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p.sub { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
  .section { margin-bottom: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.3rem; }
  input { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; width: 100%; max-width: 300px; }
  button { padding: 0.4rem 1rem; border: none; border-radius: 4px; background: #2563eb; color: white; font-size: 0.95rem; cursor: pointer; margin: 0.3rem 0.3rem 0.3rem 0; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #94a3b8; cursor: default; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  #log { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; font-family: "SF Mono", Menlo, monospace; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; max-height: 500px; overflow-y: auto; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
  .info { color: #2563eb; }
</style>
</head>
<body>

<h1>SQLCipher WASM</h1>
<p class="sub">Encrypted SQLite in the browser.  Data persists in IndexedDB as
  an encrypted blob.  Reload the page — your data survives.
  <a href="https://sqlite.org/wasm/doc/trunk/api-oo1.md">oo1 API</a> compatible.</p>

<div class="section">
  <label>Encryption key</label>
  <input id="key" type="text" value="correct-horse-battery-staple" placeholder="encryption key">
</div>

<div class="section">
  <button id="btnInsert" disabled>Insert row</button>
  <button id="btnQuery" disabled>Query all</button>
  <button id="btnClear" class="danger" disabled>Clear database</button>
</div>

<div id="log">Loading SQLCipher WASM...</div>

<!-- Emscripten-generated JS — defines initSqlcipher() -->
<script src="sqlcipher.js"></script>
<!-- oo1 API shim — defines DB class with IndexedDB persistence -->
<script src="oo1.js"></script>

<script>
var logEl = document.getElementById("log");
function log(msg, cls) {
  var span = document.createElement("span");
  span.className = cls || "";
  span.textContent = msg + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function clear() { logEl.innerHTML = ""; }

var db = null;
var Module = null;
var DB_NAME = "demo";
var DB_FILE = "/demo.db";

// ── Save to IndexedDB after every mutation ─────────────────

function save() {
  if (!db || !db.isOpen()) return;
  var bytes = db.exportDatabase();
  DB.saveToIndexedDB(DB_NAME, bytes);
  log("  (saved " + bytes.length + " bytes to IndexedDB)", "info");
}

// ── Show current rows ──────────────────────────────────────

function showRows() {
  var rows = db.selectObjects("SELECT * FROM notes ORDER BY created DESC");
  if (rows.length === 0) {
    log("  (no rows yet)", "info");
  } else {
    rows.forEach(function(r) {
      log("  [" + r.id + "] " + r.text + "  (" + new Date(r.created).toLocaleTimeString() + ")");
    });
  }
  log("  " + rows.length + " row(s)", "ok");
}

// ── Open or restore database ───────────────────────────────

async function openDB() {
  var key = document.getElementById("key").value;

  // Try to load existing encrypted database from IndexedDB
  var bytes = await DB.loadFromIndexedDB(DB_NAME);

  if (bytes) {
    log("Restoring encrypted database from IndexedDB (" + bytes.length + " bytes)...", "info");
    db = new DB(Module, {filename: DB_FILE, key: key, bytes: bytes});
    log("Database restored. Data survived page reload.", "ok");
  } else {
    log("No saved database found. Creating fresh...", "info");
    db = new DB(Module, {filename: DB_FILE, key: key});
    db.exec("CREATE TABLE notes (id INTEGER PRIMARY KEY, text TEXT, created INTEGER)");
    save();
    log("Created encrypted database.", "ok");
  }

  showRows();
}

// ── Button handlers ────────────────────────────────────────

var counter = 0;
var phrases = [
  "The sky is clear", "Wind from the north", "Temperature rising",
  "Pressure dropping", "Humidity at 65%", "Sensor calibrated",
  "Battery at 80%", "Signal strong", "All systems nominal",
  "Awaiting input", "Data collected", "Threshold exceeded"
];

document.getElementById("btnInsert").onclick = function() {
  if (!db || !db.isOpen()) return;
  counter++;
  var text = phrases[counter % phrases.length] + " #" + counter;
  try {
    db.exec({
      sql: "INSERT INTO notes (text, created) VALUES (?, ?)",
      bind: [text, Date.now()]
    });
    log("Inserted: " + text, "ok");
    save();
  } catch(e) {
    log("FAIL: " + e.message, "err");
  }
};

document.getElementById("btnQuery").onclick = function() {
  if (!db || !db.isOpen()) return;
  clear();
  log("SELECT * FROM notes ORDER BY created DESC:", "info");
  showRows();
};

document.getElementById("btnClear").onclick = function() {
  if (!db || !db.isOpen()) return;
  clear();
  db.exec("DELETE FROM notes");
  save();
  log("Cleared all rows.", "ok");
};

// ── Load WASM and open database ────────────────────────────

(async function() {
  try {
    Module = await initSqlcipher();
    log("SQLCipher WASM loaded.", "ok");

    await openDB();
    log("\nReload the page to verify persistence.\n", "info");

    document.getElementById("btnInsert").disabled = false;
    document.getElementById("btnQuery").disabled = false;
    document.getElementById("btnClear").disabled = false;
  } catch(e) {
    log("FAIL: " + e.message, "err");
    log("Build the WASM module first — see README.", "info");
  }
})();
</script>

</body>
</html>
